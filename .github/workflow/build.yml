name: Build CUDA Wheels for Arch Linux (sm_120)

# GitHubの画面上から手動でビルドを開始できるようにする
on:
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    # ローカルと完全に環境を合わせるためArch Linuxコンテナを使用
    container:
      image: archlinux:latest

    steps:
      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm
          # GitHub Actionsの仕様上nodejsが必要なため追加
          pacman -S --noconfirm base-devel cuda python python-pip git nodejs

      - name: Setup Virtual Environment & Install Build Tools
        run: |
          python -m venv /build_venv
          source /build_venv/bin/activate
          pip install torch ninja packaging psutil wheel

      - name: Build flash-attn Wheel
        run: |
          source /build_venv/bin/activate
          git clone https://github.com/Dao-AILab/flash-attention.git
          cd flash-attention
          # RTX 5070 Ti (Blackwell) をターゲットに指定
          export TORCH_CUDA_ARCH_LIST="12.0"
          # GitHubランナー(RAM 16GB)のOOMを避けるため並列数を制限
          export MAX_JOBS=2
          # インストールせず、.whlファイルのみを生成して /output ディレクトリに出力
          pip wheel . --no-build-isolation --wheel-dir=/output

      - name: Build exllamav3 Wheel
        run: |
          source /build_venv/bin/activate
          git clone https://github.com/turboderp-org/exllamav3.git
          cd exllamav3
          export TORCH_CUDA_ARCH_LIST="12.0"
          export MAX_JOBS=2
          pip wheel . --no-build-isolation --wheel-dir=/output

      - name: Upload Wheels as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-cp314-sm120-wheels
          path: /output/*.whl