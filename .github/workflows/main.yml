name: Build CUDA Wheels for Arch Linux (sm_120)

on:
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    # Arch Linuxではなく、PyTorch公式のCUDA 12.1開発用コンテナを使用する
    # これによりC++コンパイラや標準ライブラリのバージョン問題を回避できる
    container:
      image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-devel

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          # nodejsはGitHub Actionsの動作に必要
          apt-get install -y git build-essential nodejs

      - name: Setup Python Environment
        run: |
          # コンテナ内のPython(3.10等)で仮想環境を作成
          python -m venv /build_venv
          source /build_venv/bin/activate
          pip install --upgrade pip
          pip install ninja packaging psutil wheel

      - name: Build flash-attn Wheel
        run: |
          source /build_venv/bin/activate
          git clone https://github.com/Dao-AILab/flash-attention.git
          cd flash-attention
          
          # develコンテナはCUDA_HOMEが既に設定済み
          export TORCH_CUDA_ARCH_LIST="12.0"
          export MAX_JOBS=2
          pip wheel . --no-build-isolation --wheel-dir=/output

      - name: Build exllamav3 Wheel
        run: |
          source /build_venv/bin/activate
          git clone https://github.com/turboderp-org/exllamav3.git
          cd exllamav3
          
          export TORCH_CUDA_ARCH_LIST="12.0"
          export MAX_JOBS=2
          pip wheel . --no-build-isolation --wheel-dir=/output

      - name: Upload Wheels as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-cuda121-sm120-wheels
          path: /output/*.whl