name: Build CUDA Wheels for Arch Linux (sm_120)

on:
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    # 最新GPUをサポートするCUDA 13.2と、安定したGCCを持つUbuntu 24.04の組み合わせ
    container:
      image: nvidia/cuda:13.2.0-devel-ubuntu24.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          # インストール時のタイムゾーン入力待ちでフリーズするのを防ぐ環境変数を追加
          DEBIAN_FRONTEND=noninteractive apt-get install -y tzdata git build-essential python3 python3-pip python3-venv nodejs

      - name: Setup Python Environment
        run: |
          python3 -m venv /build_venv
          source /build_venv/bin/activate
          pip install --upgrade pip
          # PyTorchの最新安定版とビルドツールを導入
          pip install torch ninja packaging psutil wheel

      - name: Build flash-attn Wheel
        run: |
          source /build_venv/bin/activate
          git clone https://github.com/Dao-AILab/flash-attention.git
          cd flash-attention
          
          mkdir -p /output
          export TORCH_CUDA_ARCH_LIST="12.0"
          export MAX_JOBS=2
          pip wheel . --no-build-isolation --wheel-dir=/output

      - name: Build exllamav3 Wheel
        run: |
          source /build_venv/bin/activate
          git clone https://github.com/turboderp-org/exllamav3.git
          cd exllamav3
          
          mkdir -p /output
          export TORCH_CUDA_ARCH_LIST="12.0"
          export MAX_JOBS=2
          pip wheel . --no-build-isolation --wheel-dir=/output

      - name: Upload Wheels as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu2404-cuda132-sm120-wheels
          path: /output/*.whl